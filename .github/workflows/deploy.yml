name: Deploy to Google Play

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      manual_track:
        description: 'Выберите трек для ручной публикации'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Determine Google Play Track
        id: determine_track
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TRACK="wear:${{ inputs.manual_track }}"
          else
            TAG="${{ github.ref_name }}"
            if [[ "$TAG" == *"-alpha"* ]]; then
              TRACK="wear:alpha"
            elif [[ "$TAG" == *"-beta"* ]]; then
              TRACK="wear:beta"
            else
              TRACK="wear:production"
            fi
          fi
          
          echo "track=$TRACK" >> $GITHUB_OUTPUT
          echo "Determined track: $TRACK"

      - name: Build & Sign Release AAB
        run: ./gradlew :app:bundleRelease
        env:
          ANDROID_KEYSTORE_FILE: release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_KEY }}
          packageName: com.dertefter.wearfiles
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          status: draft
          tracks: ${{ steps.determine_track.outputs.track }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
