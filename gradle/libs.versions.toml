[versions]
activityCompose = "1.12.0"
composeBom = "2025.11.01"
composeMaterial3 = "1.5.5"
wearComposeNavigation = "1.6.0-alpha06"
coreKtx = "1.17.0"
materialIconsExtended = "1.7.8"
